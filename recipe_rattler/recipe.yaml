build:
  number: 1
  files:
    exclude:
      - "**/__pycache__"
      - "**/test-files"
  script:
    env:
      REST_HOME: ${SRC_DIR}
      # REST_DEPS: "${SRC_DIR}/rest_deps_placeholder_placeholder"
      HDF5_DIR: "${BUILD_PREFIX}"
    content: |
      set -ex
      cd rest
      # mkdir -p ${REST_DEPS}
      # mkdir -p ${REST_DEPS}/lib
      if [[ "$target_platform" == win-* ]]; then
        LIB_EXT="dll"
        REST_EXT_DIR="${PREFIX}/Library/bin"
        LIBCLANG_PATH="${BUILD_PREFIX}/Library/bin"
      elif [[ "$target_platform" == osx-* ]]; then
        LIB_EXT="dylib"
        REST_EXT_DIR="${PREFIX}/lib"
        LIBCLANG_PATH="${BUILD_PREFIX}/lib"
      else
        LIB_EXT="so"
        REST_EXT_DIR="${PREFIX}/lib"
        LIBCLANG_PATH="${BUILD_PREFIX}/lib"
      fi

      mkdir -p "${REST_EXT_DIR}"
      # cp ${BUILD_PREFIX}/lib/*.${LIB_EXT} ${REST_EXT_DIR}/
      MOKIT_LIB=""
      # Some win-64 mokit builds install this library without the "lib" prefix.
      MOKIT_CANDIDATES=(
        "${BUILD_PREFIX}/lib/python${PY_VER}/site-packages/mokit/lib/librest2fch.${LIB_EXT}"
        "${BUILD_PREFIX}/Lib/site-packages/mokit/lib/librest2fch.${LIB_EXT}"
        "${BUILD_PREFIX}/Lib/site-packages/mokit/lib/rest2fch.${LIB_EXT}"
      )
      for CANDIDATE in "${MOKIT_CANDIDATES[@]}"; do
        if [[ -f "${CANDIDATE}" ]]; then
          MOKIT_LIB="${CANDIDATE}"
          break
        fi
      done
      if [[ -z "${MOKIT_LIB}" ]]; then
        echo "Could not find mokit bridge library after checking:" >&2
        printf '  - %s\n' "${MOKIT_CANDIDATES[@]}" >&2
        exit 1
      fi
      cp "${MOKIT_LIB}" "${REST_EXT_DIR}/"
      export LIBCLANG_PATH
      cargo install --path . --profile release --root ${PREFIX}
      mkdir -p ${PREFIX}/share/rest/
      cp -r ./basis-set-pool ${PREFIX}/share/rest/
      # cp ${REST_EXT_DIR}/librestmatr.${LIB_EXT} ${PREFIX}/lib/
      # if [[ "$target_platform" == osx-* ]]; then
      #   install_name_tool -id "@rpath/librestmatr.dylib" ${PREFIX}/lib/librestmatr.dylib
      # fi
      # cp ${REST_EXT_DIR}/librest2fch.${LIB_EXT} ${PREFIX}/lib/
      # todo: remove the manual copy

requirements:
  build:
    - if: win64
      then: gcc_win-64
      else: ${{ compiler('c') }}
    #- {{ stdlib('c') }}
    - if: win64
      then: gxx_win-64
      else: ${{ compiler('cxx') }}
    - if: win64
      then: gfortran_win-64
      else: ${{ compiler('fortran') }}
    - ${{ compiler('rust') }}
    - libclang 21.*
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: linux
      then: sysroot_linux-64 ==2.17
    - if: osx
      then: llvm-openmp
  host:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: osx
      then: llvm-openmp
  run:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4

tests:
  - script: run_tests.sh
    requirements:
      run:
        # - {{ compiler('rust') }}
        - restgroup::rest_regression
    files:
      source:
        # - rest/basis-set-pool
        - rest_regression

